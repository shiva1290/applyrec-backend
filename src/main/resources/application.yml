server:
  port: ${PORT:8080}

spring:
  application:
    name: applyrec-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-days: 7

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    root: INFO
    org.hibernate.SQL: DEBUG